<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RideMate AI — Multi-Agent Carpool</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #F0F4FF;
      --surface: #FFFFFF;
      --text: #3D3D5C;
      --text-light: #8E8EA0;
      --shadow: rgba(0,0,0,0.12);
      --purple: #A78BFA;
      --amber: #FBBF24;
      --pink: #F472B6;
      --green: #34D399;
      --blue: #60A5FA;
      --red: #F87171;
      --input-bg: #E8ECF5;
      --user-msg: #DDD6FE;
    }

    /* ===== Dark Mode ===== */
    body.dark {
      --bg: #1A1B2E;
      --surface: #252642;
      --text: #E4E4F0;
      --text-light: #8E8EA0;
      --shadow: rgba(0,0,0,0.35);
      --input-bg: #1E1F35;
      --user-msg: #2D2B55;
    }

    html, body {
      font-family: 'Inter', sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      margin: 0; padding: 14px;
      transition: background 0.3s;
    }

    /* ===== Layout ===== */
    .app-container {
      display: flex; min-height: calc(100vh - 28px); max-width: 1200px;
      margin: 0 auto; border-radius: 32px; overflow: hidden;
      background: var(--bg); box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      transition: background 0.3s;
    }

    /* ===== Left panel — Chat ===== */
    .panel-chat {
      flex: 1; min-width: 340px; max-width: 500px;
      display: flex; flex-direction: column;
      border-right: 2px solid rgba(0,0,0,0.06);
    }

    .chat-header {
      padding: 18px 20px 8px; text-align: center; flex-shrink: 0;
    }
    .chat-header h1 {
      font-size: 20px; font-weight: 800; color: var(--text);
      letter-spacing: -0.3px;
    }
    .chat-header .sub {
      font-size: 10px; color: var(--text-light); font-weight: 600; margin-top: 2px;
    }

    /* Dark mode toggle */
    .theme-toggle {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; padding: 4px 20px 8px; flex-shrink: 0;
    }
    .theme-toggle span { font-size: 10px; font-weight: 700; color: var(--text-light); }
    .theme-switch {
      width: 48px; height: 26px; border-radius: 13px;
      background: var(--input-bg); box-shadow: inset 2px 3px 0 var(--shadow);
      position: relative; cursor: pointer; transition: all 0.3s;
    }
    .theme-switch::after {
      content: ''; position: absolute; width: 20px; height: 20px; border-radius: 50%;
      background: var(--amber); top: 3px; left: 3px;
      box-shadow: 2px 3px 0 var(--shadow); transition: all 0.3s;
    }
    body.dark .theme-switch { background: var(--purple); }
    body.dark .theme-switch::after { left: 25px; background: #fff; }

    /* Agent pills */
    .agent-pills {
      display: flex; gap: 5px; padding: 4px 16px 6px; flex-shrink: 0;
      justify-content: center; flex-wrap: wrap;
    }
    .agent-pill {
      font-size: 8px; font-weight: 700; padding: 4px 10px; border-radius: 999px;
      color: var(--text-light); background: var(--input-bg);
      box-shadow: 2px 3px 0 var(--shadow); transition: all 0.2s;
    }
    .agent-pill.on:nth-child(1) { background: var(--purple); color: #fff; }
    .agent-pill.on:nth-child(2) { background: var(--blue); color: #fff; }
    .agent-pill.on:nth-child(3) { background: var(--amber); color: #3D3D5C; }
    .agent-pill.on:nth-child(4) { background: var(--pink); color: #fff; }
    .agent-pill.on:nth-child(5) { background: var(--green); color: #fff; }

    /* Chat messages */
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 6px 14px 8px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--text-light); border-radius: 2px; }

    .msg-bubble {
      max-width: 88%; padding: 10px 14px; border-radius: 18px;
      font-size: 11px; font-weight: 600; line-height: 1.5; word-break: break-word;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .msg-user {
      align-self: flex-end; background: var(--user-msg); color: var(--text);
      border-bottom-right-radius: 6px;
      box-shadow: 3px 4px 0 var(--shadow);
    }
    .msg-bot {
      align-self: flex-start; background: var(--surface); color: var(--text);
      border-bottom-left-radius: 6px;
      box-shadow: 3px 4px 0 var(--shadow);
    }
    .msg-tool {
      align-self: center; font-size: 8px; font-weight: 700; padding: 4px 10px;
      border-radius: 999px; color: #7C6F3C; background: var(--amber);
      box-shadow: 2px 3px 0 rgba(0,0,0,0.1);
    }
    .agent-trail {
      align-self: flex-start; font-size: 7px; font-weight: 700; color: var(--text-light);
      padding-left: 4px; margin-top: -3px;
    }

    /* Input */
    .chat-input-area {
      padding: 6px 14px 14px; flex-shrink: 0; display: flex; gap: 8px;
    }
    .chat-input-area input {
      flex: 1; padding: 10px 14px; border-radius: 20px;
      font-size: 11px; font-weight: 600; color: var(--text);
      background: var(--input-bg); border: none; outline: none;
      box-shadow: inset 3px 4px 0 var(--shadow); font-family: inherit;
    }
    .chat-input-area input::placeholder { color: var(--text-light); }
    .send-btn {
      width: 42px; height: 42px; border-radius: 14px;
      background: var(--purple); border: none; font-size: 17px;
      cursor: pointer; color: #fff; flex-shrink: 0;
      box-shadow: 3px 5px 0 var(--shadow); transition: all 0.15s;
      font-weight: 700;
    }
    .send-btn:active { box-shadow: 1px 2px 0 var(--shadow); transform: translate(2px,3px); }

    /* Quick buttons */
    .quick-row {
      display: flex; gap: 5px; padding: 2px 14px 4px; flex-shrink: 0; overflow-x: auto;
    }
    .quick-row::-webkit-scrollbar { height: 0; }
    .quick-btn {
      padding: 6px 13px; border-radius: 999px; font-size: 9px; font-weight: 700;
      font-family: inherit; border: none; cursor: pointer; white-space: nowrap; flex-shrink: 0;
      box-shadow: 3px 4px 0 var(--shadow); transition: all 0.15s; color: #fff;
    }
    .quick-btn:nth-child(1) { background: var(--purple); }
    .quick-btn:nth-child(2) { background: var(--green); }
    .quick-btn:nth-child(3) { background: var(--blue); }
    .quick-btn:nth-child(4) { background: var(--amber); color: #3D3D5C; }
    .quick-btn:nth-child(5) { background: var(--surface); color: var(--text); }
    .quick-btn:active { box-shadow: 1px 2px 0 var(--shadow); transform: translate(2px,3px); }

    /* Loading / thinking indicator */
    .msg-thinking {
      color: var(--text-light); font-style: italic; font-size: 12px;
      padding: 10px 18px; animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; } 50% { opacity: 1.0; }
    }

    /* ===== Right panel ===== */
    .panel-tabs { flex: 1; min-width: 300px; display: flex; flex-direction: column; }

    .tab-bar {
      display: flex; gap: 6px; padding: 4px; margin: 10px 12px 6px;
      border-radius: 20px; background: var(--input-bg);
      box-shadow: inset 2px 3px 0 var(--shadow); flex-shrink: 0;
    }
    .tab-btn {
      flex: 1; padding: 8px 0; border: none; border-radius: 16px;
      font-size: 11px; font-weight: 700; cursor: pointer; background: transparent;
      color: var(--text-light); font-family: inherit; transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--purple); color: #fff;
      box-shadow: 3px 4px 0 var(--shadow);
    }

    .tab-content { flex: 1; overflow-y: auto; padding: 8px 12px; }
    .tab-content::-webkit-scrollbar { width: 4px; }
    .tab-content::-webkit-scrollbar-thumb { background: var(--text-light); border-radius: 2px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ===== Board cards ===== */
    .board-card {
      background: var(--surface); border-radius: 20px; padding: 14px 16px;
      margin-bottom: 10px; box-shadow: 4px 5px 0 var(--shadow);
    }
    .board-card .author {
      font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 4px;
    }
    .board-card .content {
      font-size: 11px; color: var(--text); line-height: 1.5; font-weight: 500;
    }
    .board-card .meta {
      font-size: 8px; color: var(--text-light); margin-top: 8px;
      display: flex; gap: 10px; align-items: center; font-weight: 700;
    }
    .board-card .tag {
      display: inline-block; padding: 3px 9px; border-radius: 999px;
      font-size: 8px; font-weight: 700; background: var(--amber); color: #7C6F3C;
      box-shadow: 2px 3px 0 rgba(0,0,0,0.1);
    }

    /* ===== Driver cards ===== */
    .driver-card {
      background: var(--surface); border-radius: 20px; padding: 14px 16px;
      margin-bottom: 10px; box-shadow: 4px 5px 0 var(--shadow);
      display: flex; align-items: flex-start; gap: 12px;
    }
    .driver-avatar {
      width: 42px; height: 42px; border-radius: 14px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800; color: #fff;
      box-shadow: 3px 4px 0 var(--shadow);
    }
    .driver-avatar.c1 { background: var(--purple); }
    .driver-avatar.c2 { background: var(--pink); }
    .driver-avatar.c3 { background: var(--blue); }
    .driver-info { flex: 1; min-width: 0; }
    .driver-info .name { font-size: 12px; font-weight: 700; color: var(--text); }
    .driver-info .loc { font-size: 10px; color: var(--blue); font-weight: 600; margin: 2px 0; }
    .driver-info .msg { font-size: 11px; color: var(--text); font-weight: 500; }
    .driver-meta {
      font-size: 9px; color: var(--text-light); margin-top: 6px;
      display: flex; gap: 14px; font-weight: 700;
    }
    .driver-live {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 9px; font-weight: 700; color: var(--green);
    }
    .live-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--green);
      animation: blink 1s steps(2) infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ===== Welcome card ===== */
    .welcome-card {
      background: linear-gradient(135deg, var(--purple), var(--pink));
      border-radius: 20px; padding: 16px 20px; margin-bottom: 10px;
      box-shadow: 4px 5px 0 var(--shadow); color: #fff;
    }
    .welcome-card .greeting { font-size: 14px; font-weight: 800; margin-bottom: 4px; }
    .welcome-card .stats { font-size: 10px; font-weight: 600; opacity: 0.85; }
    .welcome-card .stats span { margin-right: 14px; }

    .rec-card {
      background: var(--surface); border-radius: 16px; padding: 14px 16px;
      margin-bottom: 10px; box-shadow: 3px 4px 0 var(--shadow);
    }
    .rec-card .rec-reason { font-size: 9px; font-weight: 700; color: var(--purple); margin-bottom: 4px; }
    .rec-card .rec-route { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .rec-card .rec-meta { font-size: 11px; color: var(--text-light); margin-top: 4px; font-weight: 600; }
    .rec-card .rec-action {
      display: inline-block; padding: 6px 16px;
      border-radius: 999px; font-size: 10px; font-weight: 700; color: #fff;
      background: var(--purple); cursor: pointer; border: none;
      box-shadow: 2px 3px 0 var(--shadow); font-family: inherit;
    }
    .rec-card .rec-action:active { box-shadow: 1px 1px 0 var(--shadow); transform: translate(1px,2px); }

    /* ===== Empty state ===== */
    .empty-state { text-align: center; padding: 50px 20px; }
    .empty-state .icon { font-size: 44px; margin-bottom: 12px; }
    .empty-state p { color: var(--text-light); font-size: 11px; font-weight: 600; }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
      .app-container { flex-direction: column; }
      .panel-chat { max-width: 100%; min-width: 0; flex: none; height: 50vh; }
      .panel-tabs { flex: 1; min-width: 0; }
    }
  </style>
</head>
<body>
<div class="app-container">

  <!-- ===== LEFT: Chat ===== -->
  <div class="panel-chat">
    <div class="chat-header">
      <h1>🚗 RideMate AI</h1>
      <p class="sub">Your personal ride coordinator</p>
    </div>
    <div class="theme-toggle">
      <span>☀️</span>
      <div class="theme-switch" onclick="toggleTheme()"></div>
      <span>🌙</span>
    </div>
    <div class="agent-pills" id="agentPills">
      <span class="agent-pill on">Coordinator</span>
      <span class="agent-pill on">Discovery</span>
      <span class="agent-pill on">Bookings</span>
      <span class="agent-pill on">Board</span>
      <span class="agent-pill on">Profile</span>
    </div>
    <div class="chat-messages" id="chat"></div>
    <div class="quick-row">
      <button class="quick-btn" onclick="quickSend('I want to offer a ride. From University Campus to Downtown, departure tomorrow 9am, 3 seats, \$5.50 per seat.')">🚘 Offer</button>
      <button class="quick-btn" onclick="quickSend('I just arrived at Aber Station. Waiting 20 min, 3 seats to Downtown.')">📍 Arrived</button>
      <button class="quick-btn" onclick="quickSend('Find me a ride to Downtown tomorrow morning')">🔍 Search</button>
      <button class="quick-btn" onclick="quickSend('Post to board: Anyone splitting a ride at 5pm?')">📋 Post</button>
      <button class="quick-btn" onclick="quickSend('Show my profile')">👤 Me</button>
    </div>
    <div class="chat-input-area">
      <input type="text" id="userInput" placeholder="Where do you want to go?" autofocus>
      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>

  <!-- ===== RIGHT: Tabs ===== -->
  <div class="panel-tabs">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('foryou')">✨ Suggested</button>
      <button class="tab-btn" onclick="switchTab('board')">📋 Board</button>
      <button class="tab-btn" onclick="switchTab('drivers')">📍 Drivers</button>
    </div>
    <div class="tab-content">
      <div class="tab-panel active" id="panel-foryou">
        <div class="empty-state" id="foryouContent"><div class="icon">✨</div><p>Loading suggestions...</p></div>
      </div>
      <div class="tab-panel" id="panel-board">
        <div class="empty-state" id="boardContent"><div class="icon">📋</div><p>Loading...</p></div>
      </div>
      <div class="tab-panel" id="panel-drivers">
        <div class="empty-state" id="driversContent"><div class="icon">🚗</div><p>Loading...</p></div>
      </div>
    </div>
  </div>

</div>

<script>
  let currentTab = 'foryou';
  const chatEl = document.getElementById('chat');
  const pills = document.querySelectorAll('.agent-pill');

  // ── Dark mode ──
  function toggleTheme() { document.body.classList.toggle('dark'); }
  if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.body.classList.add('dark');

  // ── Welcome greeting ──
  async function loadWelcome() {
    const el = document.getElementById('foryouContent');
    try {
      const r = await fetch('/api/v1/welcome/demo_user');
      const data = await r.json();
      if (data.status !== 'success') throw new Error('no data');

      const u = data.user || {};
      const recs = data.recommendations || [];
      const stats = data.stats || {};

      let html = `<div class="welcome-card">
        <div class="greeting">Welcome back, ${esc(u.name || 'there')}! 👋</div>
        <div class="stats">
          <span>🪑 ${stats.total_bookings || 0} rides</span>
          <span>⭐ ${stats.frequent_routes || 0} frequent routes</span>
          <span>🔖 ${(stats.saved_preferences || []).length} prefs</span>
        </div>
      </div>`;

      if (recs.length > 0) {
        html += '<div style="font-size:11px;font-weight:700;color:var(--text-light);margin:12px 0 6px;">RECOMMENDED FOR YOU</div>';
        html += recs.slice(0,5).map(r => `
          <div class="rec-card">
            <div class="rec-reason">💡 ${esc(r.reason)}</div>
            <div class="rec-route">${esc(r.driver)}: ${esc(r.from)} → ${esc(r.to)}</div>
            <div class="rec-meta">🕐 ${fmtTime(r.departure)} &nbsp; 🪑 ${r.seats} seats &nbsp; 💰 $${r.price}</div>
            <button class="rec-action" onclick="quickSend('Book ride #${r.ride_id} for me, 1 seat')">Book Now</button>
          </div>
        `).join('');
      } else {
        html += '<div class="empty-state"><div class="icon">🔍</div><p>No recommendations yet.<br>Take a ride and I will learn your routes!</p></div>';
      }

      el.innerHTML = html;
    } catch(e) {
      el.innerHTML = '<div class="welcome-card"><div class="greeting">Welcome to RideMate AI!</div><div class="stats">Your personal ride coordinator</div></div><div class="empty-state"><p>Start chatting to get recommendations!</p></div>';
    }
  }

  // ── Tabs ──
  function switchTab(name) {
    currentTab = name;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase().includes(name==='foryou'?'suggested':name)));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
    if (name === 'board') refreshBoard();
    if (name === 'drivers') refreshDrivers();
    if (name === 'foryou') loadWelcome();
  }

  // ── Board ──
  async function refreshBoard() {
    const el = document.getElementById('boardContent');
    try {
      const r = await fetch('/api/v1/board'); const data = await r.json();
      if (!data.messages?.length) {
        el.innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>No messages yet.<br>Use chat to post one!</p></div>';
        return;
      }
      el.innerHTML = data.messages.map(m => `
        <div class="board-card">
          <div class="author">${esc(m.author)}</div>
          <div class="content">${esc(m.content)}</div>
          <div class="meta">
            ${m.location ? '<span class="tag">📍 '+esc(m.location)+'</span>' : ''}
            <span>${timeAgo(m.time)}</span>
          </div>
        </div>
      `).join('');
    } catch(e) { el.innerHTML = '<div class="empty-state"><p>Unable to load.</p></div>'; }
  }

  // ── Drivers ──
  async function refreshDrivers() {
    const el = document.getElementById('driversContent');
    try {
      const r = await fetch('/api/v1/drivers/active'); const data = await r.json();
      if (!data.drivers?.length) {
        el.innerHTML = '<div class="empty-state"><div class="icon">🚗</div><p>No drivers active.<br>Be the first!</p></div>';
        return;
      }
      const colors = ['c1','c2','c3'];
      el.innerHTML = data.drivers.map((d,i) => `
        <div class="driver-card">
          <div class="driver-avatar ${colors[i%3]}">${esc(d.name)[0]}</div>
          <div class="driver-info">
            <div class="name">${esc(d.name)} <span class="driver-live"><span class="live-dot"></span> LIVE</span></div>
            <div class="loc">📍 ${esc(d.location)}${d.destination ? ' → '+esc(d.destination) : ''}</div>
            <div class="msg">${esc(d.message)}</div>
            <div class="driver-meta">${d.seats>0?'<span>🪑 '+d.seats+' seats</span>':''}</div>
          </div>
        </div>
      `).join('');
    } catch(e) { el.innerHTML = '<div class="empty-state"><p>Unable to load.</p></div>'; }
  }

  // ── Chat ──
  function addChat(text, cls) {
    const el = document.createElement('div');
    el.className = 'msg-bubble ' + cls;
    el.innerHTML = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
    chatEl.appendChild(el); chatEl.scrollTop = chatEl.scrollHeight;
    return el;
  }
  function addTool(text) {
    const el = document.createElement('div');
    el.className = 'msg-tool'; el.textContent = '🔧 ' + text;
    chatEl.appendChild(el); chatEl.scrollTop = chatEl.scrollHeight;
  }
  function addTrail(agents) {
    const el = document.createElement('div');
    el.className = 'agent-trail'; el.textContent = agents.join('  ·  ');
    chatEl.appendChild(el); chatEl.scrollTop = chatEl.scrollHeight;
    pills.forEach(p => {
      const label = p.textContent.toLowerCase();
      // Map short labels to full agent names
      const keywords = label === 'bookings' ? ['ridemanager'] :
                       label === 'discovery' ? ['matchingagent'] :
                       label === 'coordinator' ? ['orchestrator'] :
                       label === 'board' ? ['communityagent'] :
                       [label];
      const m = agents.some(a => keywords.some(k => a.toLowerCase().includes(k)));
      p.classList.toggle('on', m);
    });
  }

  async function doSend(text) {
    addChat(text, 'msg-user');
    // Show thinking indicator while waiting for AI response
    const el = addChat('Thinking...', 'msg-thinking');
    try {
      const r = await fetch('/api/v1/chat', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({user_id:'demo_user', message:text})
      });
      const d = await r.json();
      el.remove(); // Replace thinking indicator with real response
      if (d.tool_calls_made?.length) addTool(d.tool_calls_made.join('  ·  '));
      addChat(d.message || 'Done.', 'msg-bot');
      if (d.agents_involved?.length) addTrail(d.agents_involved);
      refreshBoard(); refreshDrivers();
    } catch(e) { el.remove(); addChat('Unable to reach server.', 'msg-bot'); }
  }
  function sendMessage() {
    const inp = document.getElementById('userInput');
    const t = inp.value.trim(); if (!t) return;
    inp.value = ''; doSend(t);
  }
  function quickSend(t) { document.getElementById('userInput').value = ''; doSend(t); }
  document.getElementById('userInput').addEventListener('keypress', e => { if (e.key==='Enter') sendMessage(); });

  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function fmtTime(ts) { if (!ts) return ''; return ts.replace('T', ' ').substring(0, 16); }
  function timeAgo(ts) {
    if (!ts) return ''; if (!ts.endsWith('Z') && !ts.includes('+')) ts += 'Z';
	    const d = new Date(ts), n = new Date(), s = Math.floor((n-d)/1000);
    if (s<60) return 'now'; if (s<3600) return Math.floor(s/60)+'m'; if (s<86400) return Math.floor(s/3600)+'h';
    return Math.floor(s/86400)+'d';
  }

  addChat('Hello! I am <strong>RideMate AI</strong> — your personal ride coordinator.<br><br>Check the ✨ <strong>Suggested</strong> tab for personalized ride recommendations based on your history. Use the 📋 Board and 📍 Drivers tabs to coordinate with the community.', 'msg-bot');
  addTrail(['Orchestrator','MatchingAgent','RideManager','CommunityAgent','ProfileAgent']);
  // Map internal names to display names for the pills
  pills.forEach(p => p.classList.add('on')); // all on by default
  loadWelcome(); refreshBoard(); refreshDrivers();
  setInterval(() => { if (currentTab==='drivers') refreshDrivers(); }, 15000);
</script>
